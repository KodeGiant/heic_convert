<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEIC & GIF Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="app.js" defer></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 2rem;
      color: #322;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.8rem;
    }

    .subtitle {
      color: #666;
      margin: 0 0 1.5rem;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone.dragover {
      border-color: #0066ff;
      background: #f0f5ff;
    }

    .drop-zone p {
      margin: 0.25rem 0;
      color: #555;
    }

    .file-label {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.5rem 1.25rem;
      background: #0066ff;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .file-label:hover {
      background: #0052cc;
    }

    .quality-control {
      margin: 1.5rem 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    #convert-btn {
      width: 100%;
      padding: 0.75rem;
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    #convert-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #convert-btn:hover:not(:disabled) {
      background: #0052cc;
    }

    .status {
      margin-top: 1rem;
      text-align: center;
      color: #555;
    }

    .status.error {
      color: #cc0000;
    }

    #results {
      margin-top: 1.5rem;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .results-header h2 {
      margin: 0;
    }

    #download-all-btn {
      padding: 0.5rem 1rem;
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #download-all-btn:hover {
      background: #218838;
    }

    #results-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: #f8f8f8;
      border-radius: 6px;
    }

    .result-item a {
      padding: 0.35rem 0.75rem;
      background: #0066ff;
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .result-item a:hover {
      background: #0052cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HEIC &amp; GIF Converter</h1>
    <p class="subtitle">Convert Apple photos &amp; animated GIFs in your browser — nothing leaves your device</p>

    <!-- Drop zone (INPUT-01 target) -->
    <div id="drop-zone" class="drop-zone">
      <p>Drop HEIC or GIF files here</p>
      <p>or</p>
      <label for="file-input" class="file-label">Choose files</label>
      <input type="file" id="file-input" accept=".heic,.HEIC,image/heic,image/heif,.gif,image/gif" multiple hidden>
    </div>

    <!-- Quality control (CONV-02) -->
    <div class="quality-control">
      <label for="quality-slider">JPEG Quality: <span id="quality-value">85</span>%</label>
      <input type="range" id="quality-slider" min="1" max="100" value="85">
    </div>

    <!-- Convert action -->
    <button id="convert-btn" disabled>Convert</button>

    <!-- Status messages -->
    <p id="status" class="status" hidden></p>

    <!-- Results area (DL-01, DL-02 targets) -->
    <div id="results" hidden>
      <div class="results-header">
        <h2>Converted files</h2>
        <button id="download-all-btn">Download all as ZIP</button>
      </div>
      <ul id="results-list"></ul>
    </div>
  </div>
</body>
</html>
